# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   CONTENTSTACK_MANAGEMENT_TOKEN — required
#   CONTENTSTACK_API_KEY or VITE_CONTENTSTACK_API_KEY — stack API key (either name is fine)
#   CONTENTSTACK_PUBLISH_ENVIRONMENT or VITE_CONTENTSTACK_ENVIRONMENT — publish target uid
# Optional:
#   CONTENTSTACK_BRANCH, CONTENTSTACK_LOCALE, CONTENTSTACK_MANAGEMENT_HOST,
#   CONTENTSTACK_MANIFEST_PATH, CONTENTSTACK_PERIODIC_COUNT

name: Contentstack periodic entries

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  periodic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci

      - name: Check required secrets
        env:
          STACK_KEY: ${{ secrets.CONTENTSTACK_API_KEY || secrets.VITE_CONTENTSTACK_API_KEY }}
          MGMT: ${{ secrets.CONTENTSTACK_MANAGEMENT_TOKEN }}
        run: |
          if [ -z "$STACK_KEY" ]; then
            echo "::error::Add repository secret CONTENTSTACK_API_KEY or VITE_CONTENTSTACK_API_KEY (your Contentstack stack API key)."
            exit 1
          fi
          if [ -z "$MGMT" ]; then
            echo "::error::Add repository secret CONTENTSTACK_MANAGEMENT_TOKEN."
            exit 1
          fi

      - name: Run periodic entry script
        env:
          CONTENTSTACK_API_KEY: ${{ secrets.CONTENTSTACK_API_KEY || secrets.VITE_CONTENTSTACK_API_KEY }}
          VITE_CONTENTSTACK_API_KEY: ${{ secrets.VITE_CONTENTSTACK_API_KEY || secrets.CONTENTSTACK_API_KEY }}
          CONTENTSTACK_MANAGEMENT_TOKEN: ${{ secrets.CONTENTSTACK_MANAGEMENT_TOKEN }}
          CONTENTSTACK_MANAGEMENT_HOST: ${{ secrets.CONTENTSTACK_MANAGEMENT_HOST }}
          CONTENTSTACK_BRANCH: ${{ secrets.CONTENTSTACK_BRANCH }}
          CONTENTSTACK_LOCALE: ${{ secrets.CONTENTSTACK_LOCALE }}
          CONTENTSTACK_PUBLISH_ENVIRONMENT: ${{ secrets.CONTENTSTACK_PUBLISH_ENVIRONMENT || secrets.VITE_CONTENTSTACK_ENVIRONMENT }}
          VITE_CONTENTSTACK_ENVIRONMENT: ${{ secrets.VITE_CONTENTSTACK_ENVIRONMENT || secrets.CONTENTSTACK_PUBLISH_ENVIRONMENT }}
          CONTENTSTACK_MANIFEST_PATH: ${{ secrets.CONTENTSTACK_MANIFEST_PATH }}
          CONTENTSTACK_PERIODIC_COUNT: ${{ secrets.CONTENTSTACK_PERIODIC_COUNT }}
        # CI has no .env file; variables come from secrets above.
        run: npm run automate:entries:periodic:ci
